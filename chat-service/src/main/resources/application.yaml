server:
  port: 8087
spring:
  application:
    name: chat-service
  datasource:
    url: jdbc:mysql://localhost:3306/vendora_db
    username: root
    password: 2465

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}