server:
  port: 8091
spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://localhost:3306/vendora_db
    username: root
    password: 2465

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

stripe:
  secret: ${STRIPE_SECRET_KEY}
  public: ${STRIPE_PUBLIC_KEY}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true