name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'

      - name: Build user-service
        run: cd user-service && mvn clean install

      - name: Build provider-service
        run: cd provider-service && mvn clean install

      - name: Build booking-service
        run: cd booking-service && mvn clean install